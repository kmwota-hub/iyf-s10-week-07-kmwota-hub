<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="to-do.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <header id="main-header">
        <h1>JavaScript Practices</h1>
        <nav>
            <ul class="nav-list">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="shopping.html">Shopping Cart</a></li>
                <li><a href="todos.html" class="nav-link">To-Do List</a></li>
            </ul>
        </nav>
    </header>

    <div class="todo-form">
        <div class="container">

            <!-- Header -->
            <section>
                <h2>My To-Do List</h2>
                <p class="subtitle">Built with DOM manipulation & event listeners</p>
            </section>

            <!-- Stats -->
            <div class="stats-row">
                <div class="stat">
                    <span>TOTAL</span>
                    <strong id="total-count">0</strong>
                </div>
                <div class="stat">
                    <span>ACTIVE</span>
                    <strong id="active-count">0</strong>
                </div>
                <div class="stat">
                    <span>COMPLETED</span>
                    <strong id="completed-count">0</strong>
                </div>
            </div>

            <!-- Input -->
            <form id="todo-form">
                <input type="text" id="todo-input" placeholder="Add a new task..." autocomplete="off" required>
                <button type="submit" class="btn">Add Task</button>
            </form>

            <!-- Filters -->
            <div class="filters">
                <button class="filter active" data-filter="all">All</button>
                <button class="filter" data-filter="active">Active</button>
                <button class="filter" data-filter="completed">Completed</button>
            </div>

            <!-- Todo List -->
            <ul id="todo-list"></ul>

            <!-- Footer -->
            <div class="stats">
                <span id="items-left"></span>
                <button id="clear-completed">Clear Completed</button>
            </div>

            <script type="module" src="js/app.js"></script>
        </div>
    </div>
</body>

</html>
