<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Shopping Cart</title>
  <link rel="stylesheet" href="shopping.css">
  <style>
    .nav-list {
      list-style: none;
      display: flex;
      justify-content: end;
      gap: 20px;
    }

    .cart {
      color: white;
    }

    
  </style>
</head>

<body>
  <header>
    <div class="brand">
      <img class="logo" src="images/Logo.png" alt="Store Logo">
      <h1>Mwotsam Store</h1>
    </div>

    <div id="cart-header">
      Cart Items: <span id="cart-count">0</span>
    </div>
  </header>
  <div>
    <nav>
      <ul class="nav-list">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li class="cart"><a href="shopping.html">Shopping Cart</a></li>
        <li><a href="todos.html" class="nav-link">To-Do List</a></li>
      </ul>
    </nav>
  </div>
  <main>
    <section id="products" class="products"></section>

    <aside id="cart-section">
      <h2>Your Cart</h2>
      <div id="cart"></div>
      <p id="cart-total">Total: $0</p>
      <button onclick="clearCart()">Clear Cart</button>
    </aside>
  </main>

  <script src="app.js"></script>
</body>

</html>
